<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professional BMI Calculator - Calculate your Body Mass Index with real-time feedback and beautiful UI">
    <meta name="theme-color" content="#667eea">
    <title>BMI Calculator | Professional Health Tool</title>
    <link rel="stylesheet" href="styles.css"></head>
<body>

</head>
<body>
    <div class="container">
        <div class="card">
            <!-- Header with Title and Dark Mode Toggle -->
            <div class="header">
                <h1 class="title">BMI Calculator</h1>
                <button class="mode-toggle" id="modeToggle" title="Toggle Dark Mode">☀</button>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="errorMessage"></div>

            <!-- Input Form -->
            <form id="bmiForm">
                <div class="form-group">
                    <label for="height">Height</label>
                    <div class="input-wrapper">
                        <input 
                            type="number" 
                            id="height" 
                            placeholder="Enter your height" 
                            min="0" 
                            step="0.1"
                        >
                        <span class="input-unit">cm</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="weight">Weight</label>
                    <div class="input-wrapper">
                        <input 
                            type="number" 
                            id="weight" 
                            placeholder="Enter your weight" 
                            min="0" 
                            step="0.1"
                        >
                        <span class="input-unit">kg</span>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="button-group">
                    <button type="submit" class="btn-calculate">Calculate BMI</button>
                    <button type="reset" class="btn-reset">Reset</button>
                </div>
            </form>

            <!-- Result Section -->
            <div class="result-section" id="resultSection">
                <div class="progress-container">
                    <div class="progress-label">
                        <span>BMI Range</span>
                        <span id="bmiRange">0 - 40</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
                <div class="bmi-value" id="bmiValue">0.0</div>
                <div class="bmi-category" id="bmiCategory">Normal Weight</div>
                <div class="bmi-message" id="bmiMessage">Keep up your healthy lifestyle!</div>
            </div>

            <!-- Footer -->
            <div class="footer">
                <div class="footer-text">BMI = Weight (kg) / Height (m)²</div>
            </div>
        </div>
    </div>

    <!-- ==================== JAVASCRIPT ==================== -->
    <script src="script.js"></script>
</body>
</html>
